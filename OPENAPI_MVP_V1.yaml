openapi: 3.0.3
info:
  title: Kinetica MVP API
  version: 1.0.0
  description: >-
    MVP contract for web/mobile clients and AI service parallel development.
servers:
  - url: http://localhost:8080

paths:
  /auth/register:
    post:
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /auth/login:
    post:
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /auth/refresh:
    post:
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /auth/logout:
    post:
      tags: [Auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '204':
          description: Logged out
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /oauth2/authorization/google:
    get:
      tags: [Auth]
      summary: Start OAuth2 login with Google
      description: >-
        Redirect-based endpoint handled by Spring Security OAuth2 client. On success/failure,
        backend redirects to configured frontend URLs.
      responses:
        '302':
          description: Redirect to Google OAuth2 consent/login flow
        '500': { $ref: '#/components/responses/InternalServerError' }

  /translations:
    get:
      tags: [Translations]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List translation requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TranslationResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      tags: [Translations]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTranslationRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslationResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /translations/{id}:
    get:
      tags: [Translations]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Translation status/result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslationResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    put:
      tags: [Translations]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTranslationRequest'
      responses:
        '200':
          description: Translation updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslationResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    delete:
      tags: [Translations]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /translations/{requestId}/media:
    get:
      tags: [Media]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Media list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/MediaAssetResponse' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      tags: [Media]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMediaAssetRequest'
      responses:
        '201':
          description: Media created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaAssetResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /translations/{requestId}/media/upload:
    post:
      tags: [Media]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [kind, file]
              properties:
                kind:
                  type: string
                  enum: [VIDEO, AUDIO, IMAGE]
                file:
                  type: string
                  format: binary
                durationMs:
                  type: integer
                  format: int64
                  nullable: true
      responses:
        '201':
          description: Media uploaded and registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaAssetResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '500': { $ref: '#/components/responses/InternalServerError' }
  /translations/{requestId}/media/{mediaId}:
    get:
      tags: [Media]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: integer, format: int64 }
        - in: path
          name: mediaId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Media item
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MediaAssetResponse' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    delete:
      tags: [Media]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: integer, format: int64 }
        - in: path
          name: mediaId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /translations/{requestId}/feedback:
    get:
      tags: [Feedback]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Feedback list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FeedbackResponse' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      tags: [Feedback]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFeedbackRequest'
      responses:
        '201':
          description: Feedback created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /translations/{requestId}/feedback/{feedbackId}:
    get:
      tags: [Feedback]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: integer, format: int64 }
        - in: path
          name: feedbackId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Feedback item
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeedbackResponse' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    delete:
      tags: [Feedback]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: integer, format: int64 }
        - in: path
          name: feedbackId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /users:
    get:
      tags: [Users]
      security: [{ bearerAuth: [] }]
      description: Requires ADMIN role.
      responses:
        '200':
          description: User list (admin)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/UserResponse' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /users/{id}:
    get:
      tags: [Users]
      security: [{ bearerAuth: [] }]
      description: Requires ADMIN role.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: User item
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserResponse' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    put:
      tags: [Users]
      security: [{ bearerAuth: [] }]
      description: Requires ADMIN role.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateUserRequest' }
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserResponse' }
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    delete:
      tags: [Users]
      security: [{ bearerAuth: [] }]
      description: Requires ADMIN role.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /roles:
    get:
      tags: [Roles]
      security: [{ bearerAuth: [] }]
      description: Requires ADMIN role.
      responses:
        '200':
          description: Role list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/RoleResponse' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      tags: [Roles]
      security: [{ bearerAuth: [] }]
      description: Requires ADMIN role.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateRoleRequest' }
      responses:
        '201':
          description: Role created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoleResponse' }
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /roles/{id}:
    get:
      tags: [Roles]
      security: [{ bearerAuth: [] }]
      description: Requires ADMIN role.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Role item
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoleResponse' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    delete:
      tags: [Roles]
      security: [{ bearerAuth: [] }]
      description: Requires ADMIN role.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /roles/assign:
    post:
      tags: [Roles]
      security: [{ bearerAuth: [] }]
      description: Requires ADMIN role.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AssignRoleRequest' }
      responses:
        '204': { description: Role assigned }
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /signs:
    get:
      tags: [Signs]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List signs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SignResponse'
    post:
      tags: [Signs]
      security:
        - bearerAuth: []
      description: Requires ADMIN role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignCreateRequest'
      responses:
        '201':
          description: Sign created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /signs/{id}:
    get:
      tags: [Signs]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Sign item
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SignResponse' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    put:
      tags: [Signs]
      security:
        - bearerAuth: []
      description: Requires ADMIN role.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SignUpdateRequest' }
      responses:
        '200':
          description: Sign updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SignResponse' }
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    delete:
      tags: [Signs]
      security:
        - bearerAuth: []
      description: Requires ADMIN role.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: Sign deleted }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /kpis/translations:
    get:
      tags: [KPI]
      security:
        - bearerAuth: []
      description: Requires ADMIN role.
      parameters:
        - in: query
          name: days
          required: false
          schema:
            type: integer
            minimum: 1
            default: 7
      responses:
        '200':
          description: Aggregated translation KPIs for the selected window
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslationKpiResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /linguistics/es-to-gloss:
    post:
      tags: [Linguistics]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GlossConversionRequest'
      responses:
        '200':
          description: Converted Spanish text into LSP-oriented gloss
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlossConversionResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /linguistics/gloss-to-es:
    post:
      tags: [Linguistics]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GlossConversionRequest'
      responses:
        '200':
          description: Converted gloss text into natural Spanish
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlossConversionResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '500': { $ref: '#/components/responses/InternalServerError' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequestError:
      description: Bad request (validation or business rule error).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiErrorResponse' }
    UnauthorizedError:
      description: Authentication is required or token is invalid.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiErrorResponse' }
    ForbiddenError:
      description: Authenticated but without enough privileges.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiErrorResponse' }
    NotFoundError:
      description: Resource was not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiErrorResponse' }
    InternalServerError:
      description: Unexpected server error.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiErrorResponse' }

  schemas:
    ApiErrorResponse:
      type: object
      required: [code, message, details, timestamp]
      properties:
        code: { type: string, example: BAD_REQUEST }
        message: { type: string, example: Request could not be processed. }
        details:
          type: array
          items: { type: string }
        timestamp: { type: string, format: date-time }

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 6 }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string }

    AuthResponse:
      type: object
      properties:
        userId: { type: integer, format: int64 }
        email: { type: string }
        accessToken: { type: string }
        refreshToken: { type: string }
        tokenType: { type: string, example: Bearer }

    CreateTranslationRequest:
      type: object
      required: [direction, sourceText]
      properties:
        direction:
          type: string
          enum: [SIGN_TO_TEXT, TEXT_TO_SIGN]
        sourceText:
          type: string
    UpdateTranslationRequest:
      type: object
      required: [sourceText]
      properties:
        sourceText: { type: string }

    TranslationResponse:
      type: object
      properties:
        requestId: { type: integer, format: int64 }
        status:
          type: string
          enum: [PENDING, DONE, FAILED]
        direction:
          type: string
          enum: [SIGN_TO_TEXT, TEXT_TO_SIGN]
        textOutput: { type: string, nullable: true }
        glossOutput:
          type: string
          nullable: true
          description: Intermediate LSP gloss used in the translation pipeline.
        signOutputRef:
          type: string
          nullable: true
          description: >-
            Reference to sign representation for frontend rendering.
            For 3D avatar flows, this can point to sign-sequence JSON such as
            sign://catalog/basic-sequence or an asset key to fetch animation instructions.
        confidence: { type: number, format: double, nullable: true }
        warning: { type: string, nullable: true, example: LOW_CONFIDENCE }
        modelVersion: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateMediaAssetRequest:
      type: object
      required: [kind, storageUrl, mimeType]
      properties:
        kind:
          type: string
          enum: [VIDEO, AUDIO, IMAGE]
        storageUrl: { type: string }
        mimeType: { type: string }
        durationMs: { type: integer, format: int64, nullable: true }
        sizeBytes: { type: integer, format: int64, nullable: true }
    MediaAssetResponse:
      allOf:
        - $ref: '#/components/schemas/CreateMediaAssetRequest'
        - type: object
          properties:
            id: { type: integer, format: int64 }
            requestId: { type: integer, format: int64 }
            createdAt: { type: string, format: date-time }
            expiresAt: { type: string, format: date-time }

    CreateFeedbackRequest:
      type: object
      required: [rating]
      properties:
        userId: { type: integer, format: int64, nullable: true }
        rating: { type: integer, minimum: 1, maximum: 5 }
        correctionText: { type: string, nullable: true }
    FeedbackResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        requestId: { type: integer, format: int64 }
        userId: { type: integer, format: int64, nullable: true }
        rating: { type: integer }
        correctionText: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    UpdateUserRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
    UserResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        email: { type: string }
        createdAt: { type: string, format: date-time }

    CreateRoleRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, example: ADMIN }
    RoleResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }

    AssignRoleRequest:
      type: object
      required: [userId, roleName]
      properties:
        userId: { type: integer, format: int64 }
        roleName: { type: string, example: ADMIN }

    SignCreateRequest:
      type: object
      required: [label, mediaRef, locale]
      properties:
        label: { type: string }
        mediaRef: { type: string }
        locale: { type: string, example: es-PE }
        active: { type: boolean, default: true }
    SignUpdateRequest:
      type: object
      required: [label, mediaRef, locale]
      properties:
        label: { type: string }
        mediaRef: { type: string }
        locale: { type: string, example: es-PE }
        active: { type: boolean, default: true }
    SignResponse:
      allOf:
        - $ref: '#/components/schemas/SignCreateRequest'
        - type: object
          properties:
            id: { type: integer, format: int64 }
            normalizedLabel: { type: string }

    TranslationKpiResponse:
      type: object
      properties:
        from: { type: string, format: date-time }
        to: { type: string, format: date-time }
        totalRequests: { type: integer, format: int64 }
        completedRequests: { type: integer, format: int64 }
        failedRequests: { type: integer, format: int64 }
        successRate: { type: number, format: double }
        averageLatencyMs: { type: number, format: double, nullable: true }
        p95LatencyMs: { type: integer, format: int64, nullable: true }
        averageConfidence: { type: number, format: double, nullable: true }
        lowConfidenceRate: { type: number, format: double }
        lowConfidenceCount: { type: integer, format: int64 }

    GlossConversionRequest:
      type: object
      required: [text]
      properties:
        text: { type: string }

    GlossConversionResponse:
      type: object
      properties:
        inputText: { type: string }
        outputText: { type: string }
        confidence: { type: number, format: double }
        notes:
          type: array
          items: { type: string }
        alternatives:
          type: array
          items: { type: string }
        flags:
          type: array
          items: { type: string }
        modelVersion: { type: string }
