openapi: 3.0.3
info:
  title: Kinetica MVP API
  version: 1.0.0
  description: >-
    MVP contract for web/mobile clients and AI service parallel development.
servers:
  - url: http://localhost:8080

paths:
  /auth/register:
    post:
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/login:
    post:
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/logout:
    post:
      tags: [Auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '204':
          description: Logged out

  /translations:
    get:
      tags: [Translations]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List translation requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TranslationResponse'
    post:
      tags: [Translations]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTranslationRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslationResponse'

  /translations/{id}:
    get:
      tags: [Translations]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Translation status/result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslationResponse'
    put:
      tags: [Translations]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTranslationRequest'
      responses:
        '200':
          description: Translation updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslationResponse'
    delete:
      tags: [Translations]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: Deleted }

  /translations/{requestId}/media:
    get:
      tags: [Media]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Media list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/MediaAssetResponse' }
    post:
      tags: [Media]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMediaAssetRequest'
      responses:
        '201':
          description: Media created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaAssetResponse'

  /translations/{requestId}/media/{mediaId}:
    get:
      tags: [Media]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: integer, format: int64 }
        - in: path
          name: mediaId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Media item
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MediaAssetResponse' }
    delete:
      tags: [Media]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: integer, format: int64 }
        - in: path
          name: mediaId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: Deleted }

  /translations/{requestId}/feedback:
    get:
      tags: [Feedback]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Feedback list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FeedbackResponse' }
    post:
      tags: [Feedback]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFeedbackRequest'
      responses:
        '201':
          description: Feedback created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackResponse'

  /translations/{requestId}/feedback/{feedbackId}:
    get:
      tags: [Feedback]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: integer, format: int64 }
        - in: path
          name: feedbackId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Feedback item
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeedbackResponse' }
    delete:
      tags: [Feedback]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: integer, format: int64 }
        - in: path
          name: feedbackId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: Deleted }

  /users:
    get:
      tags: [Users]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: User list (admin)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/UserResponse' }

  /users/{id}:
    get:
      tags: [Users]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: User item
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserResponse' }
    put:
      tags: [Users]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateUserRequest' }
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserResponse' }
    delete:
      tags: [Users]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: Deleted }

  /roles:
    get:
      tags: [Roles]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Role list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/RoleResponse' }
    post:
      tags: [Roles]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateRoleRequest' }
      responses:
        '201':
          description: Role created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoleResponse' }

  /roles/{id}:
    get:
      tags: [Roles]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Role item
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoleResponse' }
    delete:
      tags: [Roles]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: Deleted }

  /signs:
    get:
      tags: [Signs]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List signs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SignResponse'
    post:
      tags: [Signs]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignCreateRequest'
      responses:
        '201':
          description: Sign created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 6 }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string }

    AuthResponse:
      type: object
      properties:
        userId: { type: integer, format: int64 }
        email: { type: string }
        accessToken: { type: string }
        refreshToken: { type: string }
        tokenType: { type: string, example: Bearer }

    CreateTranslationRequest:
      type: object
      required: [direction, sourceText]
      properties:
        direction:
          type: string
          enum: [SIGN_TO_TEXT, TEXT_TO_SIGN]
        sourceText:
          type: string
    UpdateTranslationRequest:
      type: object
      required: [sourceText]
      properties:
        sourceText: { type: string }

    TranslationResponse:
      type: object
      properties:
        requestId: { type: integer, format: int64 }
        status:
          type: string
          enum: [PENDING, DONE, FAILED]
        direction:
          type: string
          enum: [SIGN_TO_TEXT, TEXT_TO_SIGN]
        textOutput: { type: string, nullable: true }
        signOutputRef:
          type: string
          nullable: true
          description: >-
            Reference to sign representation for frontend rendering.
            For 3D avatar flows, this can point to sign-sequence JSON such as
            sign://catalog/basic-sequence or an asset key to fetch animation instructions.
        confidence: { type: number, format: double, nullable: true }
        warning: { type: string, nullable: true, example: LOW_CONFIDENCE }
        modelVersion: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateMediaAssetRequest:
      type: object
      required: [kind, storageUrl, mimeType]
      properties:
        kind:
          type: string
          enum: [VIDEO, AUDIO, IMAGE]
        storageUrl: { type: string }
        mimeType: { type: string }
        durationMs: { type: integer, format: int64, nullable: true }
        sizeBytes: { type: integer, format: int64, nullable: true }
    MediaAssetResponse:
      allOf:
        - $ref: '#/components/schemas/CreateMediaAssetRequest'
        - type: object
          properties:
            id: { type: integer, format: int64 }
            requestId: { type: integer, format: int64 }

    CreateFeedbackRequest:
      type: object
      required: [rating]
      properties:
        userId: { type: integer, format: int64, nullable: true }
        rating: { type: integer, minimum: 1, maximum: 5 }
        correctionText: { type: string, nullable: true }
    FeedbackResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        requestId: { type: integer, format: int64 }
        userId: { type: integer, format: int64, nullable: true }
        rating: { type: integer }
        correctionText: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    UpdateUserRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
    UserResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        email: { type: string }
        createdAt: { type: string, format: date-time }

    CreateRoleRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, example: ADMIN }
    RoleResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }

    SignCreateRequest:
      type: object
      required: [label, mediaRef, locale]
      properties:
        label: { type: string }
        mediaRef: { type: string }
        locale: { type: string, example: es-PE }
        active: { type: boolean, default: true }
    SignResponse:
      allOf:
        - $ref: '#/components/schemas/SignCreateRequest'
        - type: object
          properties:
            id: { type: integer, format: int64 }
            normalizedLabel: { type: string }
