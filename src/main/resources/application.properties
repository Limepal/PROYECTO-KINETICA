spring.datasource.url=jdbc:postgresql://localhost:${POSTGRES_PORT}/${POSTGRES_DB}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.application.name=KINETICA

kinetica.media.storage.local-root=${KINETICA_MEDIA_STORAGE_ROOT:./storage/media}
kinetica.media.retention-days=${KINETICA_MEDIA_RETENTION_DAYS:30}
kinetica.media.retention-scan-ms=${KINETICA_MEDIA_RETENTION_SCAN_MS:3600000}

kinetica.kpi.low-confidence-threshold=${KINETICA_KPI_LOW_CONFIDENCE_THRESHOLD:0.65}

app.gloss.provider=${KINETICA_GLOSS_PROVIDER:stub}
app.gloss.github.base-url=${GITHUB_MODELS_URL:https://models.github.ai/inference}
app.gloss.github.model-id=${MODEL_ID:openai/gpt-4o-mini}
app.gloss.github.token=${GITHUB_TOKEN:}

app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${APP_MAIL_FROM:no-reply@kinetica.local}
app.mail.welcome-subject=${APP_MAIL_WELCOME_SUBJECT:Bienvenido a Kinetica}

app.oauth2.success-redirect=${APP_OAUTH2_SUCCESS_REDIRECT:http://localhost:3000/auth/callback}
app.oauth2.failure-redirect=${APP_OAUTH2_FAILURE_REDIRECT:http://localhost:3000/auth/error}

app.security.cors-allowed-origins=${APP_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
app.security.cors-allowed-methods=${APP_SECURITY_CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
app.security.cors-allowed-headers=${APP_SECURITY_CORS_ALLOWED_HEADERS:Authorization,Content-Type}
